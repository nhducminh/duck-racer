<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Cuộc đua kì thú - Lịch sử SQLite</title>
    <link rel="stylesheet" href="index.html"> <!-- Tận dụng CSS sẵn có -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #3498db;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-race {
            background: #e74c3c;
            color: white;
        }

        .badge-wheel {
            background: #f1c40f;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-refresh {
            background-color: #2ecc71;
            color: white;
        }

        .btn-export {
            background-color: #34495e;
            color: white;
        }

        .btn-home {
            background-color: #95a5a6;
            color: white;
            text-decoration: none;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <h1>📊 Nhật ký Hệ thống (SQLite Database)</h1>

        <div class="controls">
            <a href="/" class="btn-home">⬅️ Quay lại Trang chủ</a>
            <div
                style="background: #eef2f3; padding: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center;">
                <strong>📂 Chọn Chương trình để xem / quản lý:</strong>
                <select id="adminSessionPicker"
                    style="padding: 8px; border-radius: 5px; border: 1px solid #3498db;"></select>
                <button class="btn-refresh" id="switchSessionBtn" style="background: #3498db;">Chuyển sang Lượt
                    này</button>
                <button class="btn-refresh" id="deleteSessionBtn" style="background: #e74c3c;">🗑️ Xóa Lượt này</button>
            </div>
            <button class="btn-refresh" id="refreshBtn">🔄 Làm mới Nhật ký</button>
            <button class="btn-export" id="exportBtn">📥 Xuất CSV Lịch sử</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tên Chương trình</th>
                        <th>Họ và Tên</th>
                        <th>Lượt / Kiểu</th>
                        <th>Loại hình</th>
                        <th>Thời gian</th>
                        <th>Ghi nhận vào hệ thống</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="6" style="text-align: center;">Đang tải dữ liệu từ máy chủ...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const adminSessionPicker = document.getElementById('adminSessionPicker');
        const switchSessionBtn = document.getElementById('switchSessionBtn');

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();

                adminSessionPicker.innerHTML = sessions.map(s =>
                    `<option value="${s.id}">${s.name} (${new Date(s.created_at).toLocaleDateString('vi-VN')})</option>`
                ).join('');

                const lastId = localStorage.getItem('currentSessionId');
                if (lastId) adminSessionPicker.value = lastId;
            } catch (e) {
                console.error('Lỗi tải sessions:', e);
            }
        }

        switchSessionBtn.onclick = () => {
            const sid = adminSessionPicker.value;
            localStorage.setItem('currentSessionId', sid);
            alert(`Đã chuyển sang quản lý: ${adminSessionPicker.options[adminSessionPicker.selectedIndex].text}.\nTrang chủ sẽ tự động cập nhật theo chương trình này.`);
            fetchHistory();
        };

        document.getElementById('deleteSessionBtn').onclick = async () => {
            const sid = adminSessionPicker.value;
            const sname = adminSessionPicker.options[adminSessionPicker.selectedIndex].text;

            if (!confirm(`CẢNH BÁO: Bạn có chắc chắn muốn XÓA VĨNH VIỄN chương trình: "${sname}"?\nToàn bộ người trúng thưởng của lượt này sẽ bị xóa khỏi SQLite.`)) return;

            try {
                const res = await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Đã xóa thành công!');
                    // Nếu session bị xóa trùng với session đang kích hoạt ở admin, xóa localStorage
                    if (localStorage.getItem('currentSessionId') == sid) {
                        localStorage.removeItem('currentSessionId');
                    }
                    location.reload();
                }
            } catch (e) {
                alert('Lỗi khi xóa: ' + e.message);
            }
        };

        async function fetchHistory() {
            const body = document.getElementById('historyBody');
            try {
                const res = await fetch('/api/admin/history');
                const data = await res.json();

                const currentSessionName = adminSessionPicker.options[adminSessionPicker.selectedIndex]?.text.split(' (')[0];
                const filteredData = data.filter(row => row.session_name === currentSessionName);

                if (filteredData.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" style="text-align: center;">Chưa có dữ liệu trúng thưởng cho Chương trình này</td></tr>';
                    return;
                }

                body.innerHTML = filteredData.map(row => `
                    <tr>
                        <td><strong>${row.session_name}</strong></td>
                        <td>${row.name}</td>
                        <td>${row.round}</td>
                        <td><span class="badge ${row.type === 'wheel' ? 'badge-wheel' : 'badge-race'}">${row.type === 'wheel' ? 'Vòng quay 🎰' : 'Đua vịt 🏎️'}</span></td>
                        <td>${row.date}</td>
                        <td style="font-size: 11px; color: #888;">${row.created_at}</td>
                    </tr>
                `).join('');
            } catch (err) {
                body.innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Lỗi kết nối server: ' + err.message + '</td></tr>';
            }
        }

        document.getElementById('refreshBtn').onclick = fetchHistory;

        document.getElementById('exportBtn').onclick = () => {
            const rows = Array.from(document.querySelectorAll('#historyBody tr'));
            if (rows.length === 0 || rows[0].cells.length < 2) return alert('Không có dữ liệu để xuất!');

            let csv = '\ufeffChương trình,Họ Tên,Lượt,Loại hình,Thời gian,Ghi nhận\n';
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('td')).map(c => `"${c.innerText.trim()}"`);
                csv += cols.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `lich_su_chuong_trinh_${new Date().getTime()}.csv`;
            link.click();
        };

        window.onload = async () => {
            await loadSessions();
            fetchHistory();
        };
    </script>
</body>

</html>
